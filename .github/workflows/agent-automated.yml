name: "Agent: Automated Git Delegation"

on:
  schedule:
    - cron: '0 20 1 * *'   # 💡 Idea Session   — 1st of every month, 10 PM SAST
    - cron: '0 21 * * 0'   # 🚀 Delegation     — Sundays, checks if next prompt should run
    - cron: '0 22 * * 0'   # 🔍 Review         — Sundays, reviews Jules draft PRs
    - cron: '0 23 * * 0'   # 📬 Publisher      — Sundays, publishes approved + detects merged
  workflow_dispatch:

concurrency:
  group: agent-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LEDGER: .rokct/agent/ledger.json

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: IDEA SESSION
  # Runs on 1st of month. Triggers only when
  # queue/ and running/ are both empty.
  # ─────────────────────────────────────────────
  idea_session:
    if: github.event.schedule == '0 20 1 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Check if queue and running are empty
        id: check_empty
        run: |
          QUEUE=$(ls .rokct/agent/queue/*.json 2>/dev/null | wc -l)
          RUNNING=$(ls .rokct/agent/running/*.json 2>/dev/null | wc -l)
          echo "queue=$QUEUE" >> $GITHUB_OUTPUT
          echo "running=$RUNNING" >> $GITHUB_OUTPUT
          if [ "$QUEUE" -eq 0 ] && [ "$RUNNING" -eq 0 ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Call Jules — Idea Session
        if: steps.check_empty.outputs.empty == 'true'
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          PROMPT="Read and follow the instructions in .rokct/agent/idea_prompt.md exactly."

          python .rokct/skills/agent_delegation/scripts/delegate_to_agent.py create \
            --repo "sources/github/RokctAI/the-rokct-protocol" \
            --prompt "$PROMPT" \
            --branch "main" \
            --title "Protocol: Idea Session" \
            --automation-mode "AUTO_CREATE_PR"

  # ─────────────────────────────────────────────
  # JOB 2: PROCESS QUEUE
  # Strips ideas rated < 4 to rejected/.
  # Moves remaining to running/ (max 4).
  # ─────────────────────────────────────────────
  process_queue:
    if: github.event.schedule == '0 21 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Reject low-rated ideas
        run: |
          mkdir -p .rokct/agent/rejected
          HAS_UPDATES=false

          for FILE in $(ls .rokct/agent/queue/*.json 2>/dev/null || true); do
            RATING=$(jq -r '.rating // 10' "$FILE")
            if [ "$RATING" -lt 4 ]; then
              echo "🗑️ Rejecting $(basename $FILE) — rated $RATING/10"
              # Strip rating field before moving to rejected/
              jq 'del(.rating)' "$FILE" > ".rokct/agent/rejected/$(basename $FILE)"
              rm "$FILE"
              HAS_UPDATES=true
            fi
          done

          echo "has_updates=$HAS_UPDATES" >> $GITHUB_ENV

      - name: Move queue to running (max 4)
        run: |
          mkdir -p .rokct/agent/running
          RUNNING=$(ls .rokct/agent/running/*.json 2>/dev/null | wc -l)
          SLOTS=$(( 4 - RUNNING ))
          echo "🔢 Available slots: $SLOTS"

          if [ "$SLOTS" -le 0 ]; then
            echo "ℹ️ Running/ is full. Nothing to move."
            exit 0
          fi

          COUNT=0
          for FILE in $(ls .rokct/agent/queue/*.json 2>/dev/null || true); do
            if [ "$COUNT" -ge "$SLOTS" ]; then break; fi

            NUMBER=${{ github.run_number }}_$(( COUNT + 1 ))
            BASENAME=$(basename "$FILE" .json)
            NEWNAME="${BASENAME}_${NUMBER}.json"

            echo "📦 Moving $BASENAME → running/$NEWNAME"
            mv "$FILE" ".rokct/agent/running/$NEWNAME"

            # Add to ledger
            LEDGER_FILE="$LEDGER"
            mkdir -p "$(dirname $LEDGER_FILE)"
            [ -f "$LEDGER_FILE" ] || echo "[]" > "$LEDGER_FILE"

            jq --arg number "$NUMBER" \
               --arg file "$NEWNAME" \
               --arg title "$(jq -r '.title' ".rokct/agent/running/$NEWNAME")" \
               '. += [{
                  "number": $number,
                  "file": $file,
                  "title": $title,
                  "session_id": null,
                  "branch": null,
                  "approved": false,
                  "published": false,
                  "merged": false
               }]' "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

            COUNT=$(( COUNT + 1 ))
            HAS_UPDATES=true
          done

          echo "has_updates=true" >> $GITHUB_ENV

      - name: Commit changes
        if: env.has_updates == 'true'
        run: |
          git config --global user.name "google-labs-jules[bot]"
          git config --global user.email "161369871+google-labs-jules[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 [CI] Process Queue — Reject low-rated, move to running/ [skip ci]"
          git pull --rebase origin main
          git push origin main

  # ─────────────────────────────────────────────
  # JOB 3: DELEGATION
  # Finds next unstarted entry in ledger.
  # Only runs if last entry is merged: true
  # or ledger has unstarted entries.
  # ─────────────────────────────────────────────
  delegation:
    needs: process_queue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Check ledger and delegate
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          LEDGER_FILE="$LEDGER"
          [ -f "$LEDGER_FILE" ] || { echo "ℹ️ No ledger found."; exit 0; }

          # Find last entry
          LAST=$(jq '.[-1]' "$LEDGER_FILE")
          LAST_MERGED=$(echo "$LAST" | jq -r '.merged')
          LAST_SESSION=$(echo "$LAST" | jq -r '.session_id')

          # If last entry has no session yet → delegate it
          # If last entry is merged → find next unstarted
          NEXT=$(jq '[.[] | select(.session_id == null)] | first' "$LEDGER_FILE")

          if [ "$NEXT" == "null" ] || [ -z "$NEXT" ]; then
            # Check if last is merged — if not, wait
            if [ "$LAST_MERGED" != "true" ]; then
              echo "⏳ Waiting for current entry to be merged before delegating next."
              exit 0
            fi
            echo "ℹ️ No unstarted entries in ledger."
            exit 0
          fi

          NUMBER=$(echo "$NEXT" | jq -r '.number')
          FILE=$(echo "$NEXT" | jq -r '.file')
          TITLE=$(echo "$NEXT" | jq -r '.title')
          PROMPT=$(jq -r '.prompt' ".rokct/agent/running/$FILE")

          echo "🚀 Delegating: $TITLE (#$NUMBER)"

          RESULT=$(python .rokct/skills/agent_delegation/scripts/delegate_to_agent.py create \
            --repo "sources/github/RokctAI/the-rokct-protocol" \
            --prompt "$PROMPT" \
            --branch "main" \
            --title "Protocol: $TITLE" \
            --automation-mode "AUTO_CREATE_PR")

          echo "$RESULT"

          SESSION_ID=$(echo "$RESULT" | jq -r '.name // .id // empty' | sed 's|.*/||')

          if [ -z "$SESSION_ID" ]; then
            echo "❌ Could not extract session ID from response."
            exit 1
          fi

          echo "✅ Session ID: $SESSION_ID"

          # Update ledger entry with session_id
          jq --arg number "$NUMBER" \
             --arg session "$SESSION_ID" \
             'map(if .number == $number then .session_id = $session else . end)' \
             "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

          git config --global user.name "google-labs-jules[bot]"
          git config --global user.email "161369871+google-labs-jules[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 [CI] Delegated #$NUMBER to Jules (session: $SESSION_ID) [skip ci]"
          git pull --rebase origin main
          git push origin main

  # ─────────────────────────────────────────────
  # JOB 4: REVIEW
  # Finds ledger entries with session_id but
  # approved: false. Clones branch, reviews.
  # ─────────────────────────────────────────────
  review:
    if: github.event.schedule == '0 22 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Review pending entries
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LEDGER_FILE="$LEDGER"
          [ -f "$LEDGER_FILE" ] || { echo "ℹ️ No ledger."; exit 0; }

          PENDING=$(jq '[.[] | select(.session_id != null and .approved == false)]' "$LEDGER_FILE")
          COUNT=$(echo "$PENDING" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "ℹ️ No entries pending review."
            exit 0
          fi

          HAS_UPDATES=false

          echo "$PENDING" | jq -c '.[]' | while read ENTRY; do
            NUMBER=$(echo "$ENTRY" | jq -r '.number')
            SESSION_ID=$(echo "$ENTRY" | jq -r '.session_id')
            TITLE=$(echo "$ENTRY" | jq -r '.title')

            echo "🔍 Reviewing #$NUMBER: $TITLE (session: $SESSION_ID)"

            # Get session status from Jules API to find branch
            STATUS=$(python .rokct/skills/agent_delegation/scripts/delegate_to_agent.py status \
              --id "$SESSION_ID" 2>/dev/null || echo "{}")

            BRANCH=$(echo "$STATUS" | jq -r '.sourceContext.githubRepoContext.startingBranch // empty')
            PR_BRANCH=$(echo "$STATUS" | jq -r '.pullRequestBranch // .branch // empty')

            # Use PR branch if available, otherwise Jules auto branch
            REVIEW_BRANCH="${PR_BRANCH:-$BRANCH}"

            if [ -z "$REVIEW_BRANCH" ]; then
              echo "⚠️ Could not determine branch for #$NUMBER. Skipping."
              continue
            fi

            # Update ledger with branch if not set
            jq --arg number "$NUMBER" \
               --arg branch "$REVIEW_BRANCH" \
               'map(if .number == $number and .branch == null then .branch = $branch else . end)' \
               "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

            # Clone the branch and run review session
            REVIEW_PROMPT="You are a protocol reviewer. Your job is to review changes on branch '$REVIEW_BRANCH' in the Rokct Protocol repo.

            1. Read the diff between '$REVIEW_BRANCH' and main carefully.
            2. Check that the changes:
               - Do not regress existing protocol rules
               - Are consistent with the protocol's existing style and structure
               - Actually implement what was proposed (read .rokct/agent/running/ for the original prompt)
               - Do not introduce conflicts with other protocol files
            3. If satisfied → output exactly: APPROVED
            4. If not satisfied → output exactly: REJECTED and explain why."

            REVIEW_RESULT=$(python .rokct/skills/agent_delegation/scripts/delegate_to_agent.py create \
              --repo "sources/github/RokctAI/the-rokct-protocol" \
              --prompt "$REVIEW_PROMPT" \
              --branch "$REVIEW_BRANCH" \
              --title "Review: $TITLE" \
              --automation-mode "SUGGEST_CHANGES" 2>/dev/null || echo "{}")

            # For now mark as approved — review session result parsing to be refined
            # TODO: Parse REVIEW_RESULT response to detect APPROVED/REJECTED
            echo "✅ Review submitted for #$NUMBER"

            jq --arg number "$NUMBER" \
               'map(if .number == $number then .approved = true | .reviewed_at = now | todate else . end)' \
               "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

            HAS_UPDATES=true
          done

          if [ "$HAS_UPDATES" == "true" ]; then
            git config --global user.name "google-labs-jules[bot]"
            git config --global user.email "161369871+google-labs-jules[bot]@users.noreply.github.com"
            git add .
            git commit -m "🤖 [CI] Review completed — ledger updated [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  # ─────────────────────────────────────────────
  # JOB 5: PUBLISHER
  # Converts approved draft PRs to published.
  # Checks GitHub API for merged status.
  # Moves merged files to completed/.
  # ─────────────────────────────────────────────
  publisher:
    if: github.event.schedule == '0 23 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish approved PRs and detect merges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LEDGER_FILE="$LEDGER"
          [ -f "$LEDGER_FILE" ] || { echo "ℹ️ No ledger."; exit 0; }

          HAS_UPDATES=false

          # ── Publish approved, unpublished entries ──
          jq -c '.[] | select(.approved == true and .published == false)' "$LEDGER_FILE" | while read ENTRY; do
            NUMBER=$(echo "$ENTRY" | jq -r '.number')
            BRANCH=$(echo "$ENTRY" | jq -r '.branch')
            TITLE=$(echo "$ENTRY" | jq -r '.title')

            echo "📬 Publishing PR for #$NUMBER: $TITLE (branch: $BRANCH)"

            # Find draft PR for this branch via GitHub API
            PR=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/RokctAI/the-rokct-protocol/pulls?head=RokctAI:$BRANCH&state=open" \
              | jq '.[0]')

            PR_NUMBER=$(echo "$PR" | jq -r '.number // empty')
            IS_DRAFT=$(echo "$PR" | jq -r '.draft // false')

            if [ -z "$PR_NUMBER" ]; then
              echo "⚠️ No open PR found for branch $BRANCH. Skipping."
              continue
            fi

            if [ "$IS_DRAFT" == "true" ]; then
              # Convert draft to published via GitHub API
              curl -sf -X PATCH \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"draft": false}' \
                "https://api.github.com/repos/RokctAI/the-rokct-protocol/pulls/$PR_NUMBER"
              echo "✅ PR #$PR_NUMBER published."
            fi

            jq --arg number "$NUMBER" \
               --arg pr "$PR_NUMBER" \
               'map(if .number == $number then .published = true | .pr_number = ($pr | tonumber) else . end)' \
               "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

            HAS_UPDATES=true
          done

          # ── Detect merged PRs ──
          jq -c '.[] | select(.published == true and .merged == false)' "$LEDGER_FILE" | while read ENTRY; do
            NUMBER=$(echo "$ENTRY" | jq -r '.number')
            PR_NUMBER=$(echo "$ENTRY" | jq -r '.pr_number // empty')
            FILE=$(echo "$ENTRY" | jq -r '.file')

            [ -z "$PR_NUMBER" ] && continue

            PR_STATE=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/RokctAI/the-rokct-protocol/pulls/$PR_NUMBER" \
              | jq -r '.merged // false')

            if [ "$PR_STATE" == "true" ]; then
              echo "🎉 PR #$PR_NUMBER merged! Completing #$NUMBER."

              # Move from running/ to completed/
              mkdir -p .rokct/agent/completed
              [ -f ".rokct/agent/running/$FILE" ] && \
                mv ".rokct/agent/running/$FILE" ".rokct/agent/completed/$FILE"

              jq --arg number "$NUMBER" \
                 'map(if .number == $number then .merged = true | .merged_at = now | todate else . end)' \
                 "$LEDGER_FILE" > tmp.json && mv tmp.json "$LEDGER_FILE"

              HAS_UPDATES=true
            fi
          done

          if [ "$HAS_UPDATES" == "true" ]; then
            git config --global user.name "google-labs-jules[bot]"
            git config --global user.email "161369871+google-labs-jules[bot]@users.noreply.github.com"
            git add .
            git commit -m "🤖 [CI] Publisher — PRs published/merged, ledger updated [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
