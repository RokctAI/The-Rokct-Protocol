name: "Agent: Automated Git Delegation"

on:
  schedule:
    - cron: '0 20 1 * *'   # 💡 Idea Session   — 1st of every month, 10 PM SAST
    - cron: '0 21 * * 0'   # 🚀 Delegation     — Sundays, checks if next prompt should run
    - cron: '0 22 * * 0'   # 🔍 Review         — Sundays, reviews Jules draft PRs
    - cron: '0 23 * * 0'   # 📬 Publisher      — Sundays, publishes approved + detects merged
  workflow_dispatch:

concurrency:
  group: agent-pipeline
  cancel-in-progress: false

jobs:
  idea_session:
    if: github.event.schedule == '0 20 1 * *' || github.event_name == 'workflow_dispatch'
    uses: RokctAI/shared-workflows/.github/workflows/universal-agent.yml@main
    with:
      mode: 'idea-session'
    secrets:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

  process_queue:
    if: github.event.schedule == '0 21 * * 0' || github.event_name == 'workflow_dispatch'
    uses: RokctAI/shared-workflows/.github/workflows/universal-agent.yml@main
    with:
      mode: 'process-queue'

  delegation:
    needs: process_queue
    uses: RokctAI/shared-workflows/.github/workflows/universal-agent.yml@main
    with:
      mode: 'protocol-delegation'
    secrets:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

  review:
    if: github.event.schedule == '0 22 * * 0' || github.event_name == 'workflow_dispatch'
    uses: RokctAI/shared-workflows/.github/workflows/universal-agent.yml@main
    with:
      mode: 'protocol-review'
    secrets:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publisher:
    if: github.event.schedule == '0 23 * * 0' || github.event_name == 'workflow_dispatch'
    uses: RokctAI/shared-workflows/.github/workflows/universal-agent.yml@main
    with:
      mode: 'protocol-publisher'
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}